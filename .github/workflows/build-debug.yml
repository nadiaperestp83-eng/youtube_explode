name: Build Debug APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK (fdroid flavor)
        run: flutter build apk --debug --flavor fdroid

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: musify-debug-apk
          path: build/app/outputs/flutter-apk/app-fdroid-debug.apk
          retention-days: 7
